<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>india-validators — Live Demo</title>
    <meta name="description" content="Client-side validation for Aadhaar, PAN, GSTIN, IFSC, PIN code, mobile, vehicle, passport and UPI. Zero dependencies.">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0a0a0f;
            --bg2:      #111118;
            --bg3:      #18181f;
            --surface:  #1c1c25;
            --border:   rgba(255,255,255,0.07);
            --border-h: rgba(255,255,255,0.14);
            --text:     #f0f0f5;
            --muted:    #8a8a9a;
            --dim:      #55556a;
            --blue:     #4f8ef7;
            --blue-d:   rgba(79,142,247,0.12);
            --blue-bd:  rgba(79,142,247,0.25);
            --green:    #34c77b;
            --green-d:  rgba(52,199,123,0.1);
            --green-bd: rgba(52,199,123,0.25);
            --red:      #f56565;
            --red-d:    rgba(245,101,101,0.1);
            --red-bd:   rgba(245,101,101,0.25);
            --amber:    #f5a623;
            --radius:   12px;
            --max:      720px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Nav ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            height: 54px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: rgba(10,10,15,0.88);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700;
            color: var(--text); text-decoration: none;
        }
        .nav-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 8px var(--blue);
        }
        .nav-version {
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem; color: var(--muted);
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 100px; padding: 2px 8px;
        }
        .nav-gh {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.78rem; font-weight: 500;
            color: var(--muted); text-decoration: none;
            padding: 5px 12px; border: 1px solid var(--border);
            border-radius: 100px; transition: all 0.15s;
        }
        .nav-gh:hover { color: var(--text); border-color: var(--border-h); }
        .nav-gh svg { fill: currentColor; }

        /* ── Hero ── */
        .hero {
            max-width: var(--max);
            margin: 0 auto;
            padding: 56px 24px 40px;
        }
        .hero-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.5px;
            text-transform: uppercase; color: var(--blue);
            background: var(--blue-d); border: 1px solid var(--blue-bd);
            border-radius: 100px; padding: 4px 12px; margin-bottom: 20px;
        }
        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 800; letter-spacing: -1.2px;
            line-height: 1.1; margin-bottom: 14px;
        }
        .hero h1 span {
            background: linear-gradient(135deg, #4f8ef7, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 0.95rem; color: var(--muted);
            line-height: 1.65; max-width: 480px; margin-bottom: 28px;
        }

        /* Validator pills */
        .pills {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
        }
        .pill {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem; font-weight: 500;
            color: var(--dim); background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px; padding: 4px 10px;
            cursor: pointer; transition: all 0.15s;
            user-select: none;
        }
        .pill:hover, .pill.active {
            color: var(--blue); border-color: var(--blue-bd);
            background: var(--blue-d);
        }

        /* ── Main ── */
        .main {
            max-width: var(--max);
            margin: 0 auto;
            padding: 0 24px 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Validator Card ── */
        .v-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .v-card:focus-within { border-color: var(--border-h); }

        .v-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 14px 18px 0;
            gap: 10px;
        }
        .v-title-row { display: flex; align-items: center; gap: 10px; }
        .v-icon {
            width: 34px; height: 34px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
            background: var(--blue-d); border: 1px solid var(--blue-bd);
        }
        .v-name {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem; font-weight: 700; color: var(--text);
        }
        .v-desc { font-size: 0.75rem; color: var(--dim); margin-top: 1px; }
        .v-badge {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem; font-weight: 500;
            color: var(--muted); background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 100px; padding: 2px 8px;
            white-space: nowrap; flex-shrink: 0;
        }

        .v-body { padding: 12px 18px 16px; }

        .v-input-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
        }
        .v-input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }
        .v-input::placeholder { color: var(--dim); }
        .v-input:focus { border-color: var(--blue-bd); }

        .v-btn {
            padding: 10px 18px;
            background: var(--blue);
            color: white;
            border: none; border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            transition: all 0.15s; flex-shrink: 0;
        }
        .v-btn:hover { background: #3a7ae0; transform: translateY(-1px); }
        .v-btn:active { transform: translateY(0); }

        /* Result */
        .v-result {
            display: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            line-height: 1.5;
            animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .v-result.show { display: block; }
        .v-result.ok {
            background: var(--green-d);
            border: 1px solid var(--green-bd);
            color: var(--green);
        }
        .v-result.err {
            background: var(--red-d);
            border: 1px solid var(--red-bd);
            color: var(--red);
        }
        .v-result-msg { font-weight: 600; margin-bottom: 4px; }
        .v-result-meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: inherit;
            opacity: 0.75;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.97) translateY(4px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── Code snippet ── */
        .code-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .code-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
        }
        .code-title {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem; font-weight: 500; color: var(--muted);
        }
        .copy-btn {
            font-size: 0.72rem; font-weight: 500; color: var(--dim);
            background: none; border: 1px solid var(--border);
            border-radius: 6px; padding: 3px 10px;
            cursor: pointer; transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--border-h); }
        pre {
            padding: 18px 20px;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem; line-height: 1.7;
            color: #c9d1d9; overflow-x: auto;
        }
        .kw  { color: #ff7b72; }
        .fn  { color: #79c0ff; }
        .str { color: #a5d6ff; }
        .cm  { color: #55556a; }
        .num { color: #f2cc60; }

        /* ── Footer ── */
        footer {
            max-width: var(--max);
            margin: 0 auto;
            padding: 20px 24px 36px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
            font-size: 0.75rem; color: var(--dim);
        }
        footer a {
            color: var(--muted); text-decoration: none;
            display: inline-flex; align-items: center; gap: 4px;
            font-weight: 500; transition: color 0.15s;
        }
        footer a:hover { color: var(--text); }
        footer svg { fill: currentColor; }
        .fsep { opacity: 0.3; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .hero { padding: 36px 16px 28px; }
            .main { padding: 0 16px 60px; }
            nav { padding: 0 16px; }
            .v-input-row { flex-wrap: wrap; }
            .v-btn { width: 100%; justify-content: center; }
            .nav-gh span { display: none; }
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav>
    <div style="display:flex;align-items:center;gap:10px;">
        <a class="nav-brand" href="#">
            <span class="nav-dot"></span>
            india-validators
        </a>
        <span class="nav-version">v0.1.0</span>
    </div>
    <a class="nav-gh" href="https://github.com/Gorupa/india-validators" target="_blank" rel="noopener">

    </a>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="hero-tag">🇮🇳 Made for Indian Developers</div>
    <h1>Validate Indian<br><span>IDs instantly.</span></h1>
    <p>Client-side validation for Aadhaar, PAN, GSTIN, IFSC and more. Zero dependencies, zero data sent anywhere.</p>
    <div class="pills" id="pills"></div>
</div>

<!-- Validators -->
<div class="main" id="validators"></div>

<!-- Footer -->
<footer>
    <div style="display:flex;align-items:center;gap:8px;">
        <span class="nav-dot" style="width:6px;height:6px;"></span>
        <span>india-validators · © 2026 gorupa / Gaurav Kalal</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
        <a href="https://github.com/Gorupa/india-validators" target="_blank" rel="noopener">

    </div>
</footer>

<!-- Load library from CDN -->
<script src="https://cdn.jsdelivr.net/gh/Gorupa/india-validators/india-validators.js"></script>

<script>
const validators = [
    {
        key:         'aadhaar',
        icon:        '🪪',
        name:        'Aadhaar',
        desc:        '12-digit UID · Verhoeff checksum',
        badge:       'UIDAI',
        placeholder: '2345 6789 0123',
        sample:      '234567890123',
    },
    {
        key:         'pan',
        icon:        '💳',
        name:        'PAN',
        desc:        'Permanent Account Number · 10 chars',
        badge:       'Income Tax',
        placeholder: 'ABCDE1234F',
        sample:      'ABCPE1234F',
    },
    {
        key:         'gstin',
        icon:        '🏢',
        name:        'GSTIN',
        desc:        'GST Identification Number · 15 chars',
        badge:       'GST Council',
        placeholder: '27AAAPZ0327R1ZV',
        sample:      '27AAAPZ0327R1ZV',
    },
    {
        key:         'ifsc',
        icon:        '🏦',
        name:        'IFSC',
        desc:        'Bank branch code · 11 chars',
        badge:       'RBI',
        placeholder: 'SBIN0001234',
        sample:      'SBIN0001234',
    },
    {
        key:         'pincode',
        icon:        '📮',
        name:        'PIN Code',
        desc:        'India postal code · 6 digits',
        badge:       'India Post',
        placeholder: '400001',
        sample:      '400001',
    },
    {
        key:         'mobile',
        icon:        '📱',
        name:        'Mobile',
        desc:        'Indian mobile number · 10 digits',
        badge:       'TRAI',
        placeholder: '9876543210',
        sample:      '9876543210',
    },
    {
        key:         'vehicle',
        icon:        '🚗',
        name:        'Vehicle',
        desc:        'India vehicle registration format',
        badge:       'MoRTH',
        placeholder: 'MH12AB1234',
        sample:      'MH12AB1234',
    },
    {
        key:         'passport',
        icon:        '🛂',
        name:        'Passport',
        desc:        'Indian passport number · 8 chars',
        badge:       'MEA',
        placeholder: 'A1234567',
        sample:      'A1234567',
    },
    {
        key:         'upi',
        icon:        '💸',
        name:        'UPI ID',
        desc:        'Virtual payment address · name@handle',
        badge:       'NPCI',
        placeholder: 'name@okaxis',
        sample:      'gaurav@okaxis',
    },
];

/* ── Build pill strip ── */
const pillsEl = document.getElementById('pills');
validators.forEach(v => {
    const p = document.createElement('span');
    p.className = 'pill';
    p.textContent = v.name;
    p.onclick = () => {
        document.getElementById('card-' + v.key)
            ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    pillsEl.appendChild(p);
});

/* ── Build validator cards ── */
const container = document.getElementById('validators');

validators.forEach(v => {
    const card = document.createElement('div');
    card.className = 'v-card';
    card.id = 'card-' + v.key;
    card.innerHTML = `
        <div class="v-header">
            <div class="v-title-row">
                <div class="v-icon">${v.icon}</div>
                <div>
                    <div class="v-name">${v.name}</div>
                    <div class="v-desc">${v.desc}</div>
                </div>
            </div>
            <span class="v-badge">${v.badge}</span>
        </div>
        <div class="v-body">
            <div class="v-input-row">
                <input class="v-input" id="input-${v.key}"
                    placeholder="${v.placeholder}"
                    autocomplete="off" autocorrect="off"
                    spellcheck="false">
                <button class="v-btn" onclick="runValidation('${v.key}')">
                    Validate
                </button>
            </div>
            <div class="v-result" id="result-${v.key}"></div>
        </div>`;

    // Enter key triggers validation
    container.appendChild(card);
    card.querySelector('.v-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') runValidation(v.key);
    });
});

/* ── Run validation ── */
function runValidation(key) {
    const input  = document.getElementById('input-' + key);
    const result = document.getElementById('result-' + key);
    const value  = input.value.trim();

    if (!value) {
        input.focus();
        return;
    }

    const r = IndiaValidators[key](value);
    result.className = 'v-result show ' + (r.valid ? 'ok' : 'err');

    let metaHtml = '';
    if (r.meta && Object.keys(r.meta).length) {
        const entries = Object.entries(r.meta)
            .map(([k, v]) => `${k}: ${v}`)
            .join('  ·  ');
        metaHtml = `<div class="v-result-meta">${entries}</div>`;
    }

    result.innerHTML = `
        <div class="v-result-msg">
            ${r.valid ? '✓' : '✗'} ${r.message}
        </div>
        ${metaHtml}`;
}
</script>

</body>
</html>
