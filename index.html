<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=demo/">
    <title>india-validators — Redirecting…</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrap { text-align: center; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #4f8ef7;
            box-shadow: 0 0 10px #4f8ef7;
            margin: 0 auto 16px;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }
        p { font-size: 0.85rem; color: #55556a; }
        a { color: #4f8ef7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="dot"></div>
        <p>Redirecting to <a href="demo/">demo/</a>…</p>
    </div>
    <script>window.location.replace('demo/');</script>
</body>
</html>
